name: Daily Business Intelligence Digest

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

on:
  schedule:
    # 2:41 AM UTC corresponds to 8:11 AM IST. 
    # Using an off-peak minute (41 instead of 30) bypasses GitHub's heavily congested top-of-the-hour queue.
    - cron: '41 2 * * *'
  workflow_dispatch:
    # Allows manual triggering of the workflow from the GitHub Actions UI for testing

permissions:
  contents: write

jobs:
  run-digest:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip' # cache pip dependencies for faster runs

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Daily Digest Pipeline
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        SMTP_EMAIL: ${{ secrets.SMTP_EMAIL }}
        SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      run: python run_digest.py

    - name: Commit and Push State Updates & Run Logs
      if: always()
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add data/*.json user_context.json
        git add -f daily_digest_run.log
        git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update daily digest state and upload logs [skip ci]" && git push)
